<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bella Cards</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:
radial-gradient(circle at top,#1d3b7d 0%,#101010 45%,#050505 100%);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.card{

width:92%;
max-width:420px;

background:rgba(20,20,20,.75);

backdrop-filter:blur(12px);

padding:40px;

border-radius:25px;

text-align:center;

box-shadow:0 0 40px rgba(0,0,0,.5);

border:1px solid rgba(255,255,255,.08);

}

.logo{

width:220px;

margin-bottom:25px;

}

h1{

font-size:32px;

margin-bottom:10px;

}

.sub{

color:#bbbbbb;

font-size:18px;

line-height:28px;

margin-bottom:30px;

}

.lista{

text-align:left;

margin:25px 0;

font-size:17px;

line-height:35px;

}

.botao{

display:block;

background:#25D366;

color:white;

text-decoration:none;

padding:22px;

border-radius:15px;

font-size:24px;

font-weight:bold;

transition:.3s;

margin-top:20px;

}

.botao:hover{

transform:scale(1.05);

box-shadow:0 0 30px #25D366;

}

.footer{

margin-top:30px;

font-size:14px;

color:#999;

}

</style>

</head>

<body>

<div class="card">

<img src="bella.jpg" class="logo">

<h1>Grupo VIP Bella Cards</h1>

<p class="sub">

Entre na comunidade e receba primeiro os leilões, promoções e avisos das lives.

</p>

<div class="lista">

✅ Leilões exclusivos<br>
✅ Promoções antecipadas<br>
✅ Sorteios para membros<br>
✅ Avisos das Lives

</div>

<a class="botao"

href="https://chat.whatsapp.com/HC4qDTuvgi2J3yPta98SQo"

target="_blank">

🟢 ENTRAR NO GRUPO VIP

</a>

<div class="footer">

Mais de 100 colecionadores fazem parte da comunidade.

</div>

</div>

</body>

</html>
